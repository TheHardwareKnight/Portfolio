<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control — Myles Kerschner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #e8ff47;
      --muted: #555;
      --card: #141414;
      --border: #222;
      --danger: #ff4747;
      --success: #47ff8a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-decoration: none;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
    }
    #nav-user { color: var(--muted); }
    #btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    #btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── LOGIN ── */
    #page-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    #page-login.active { display: flex; }

    .login-box {
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border);
      background: var(--card);
      padding: 2.5rem;
      animation: fadeUp 0.4s ease forwards;
    }
    .login-box h1 {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }
    .login-box p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2rem;
      font-family: 'Space Mono', monospace;
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.7rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #d4eb3a; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      margin-top: 1rem;
      min-height: 1rem;
    }

    /* ── DASHBOARD ── */
    #page-dashboard {
      padding-top: 5rem;
      min-height: 100vh;
    }
    #page-dashboard.active { display: block; }

    .dash-header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .dash-header h2 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .dash-header h2 span { color: var(--accent); }
    .dash-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── DEVICE GRID ── */
    #page-devices.active { display: block; }
    #page-devices { display: none; padding: 1.5rem 2.5rem; }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .device-card {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .device-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .device-card:hover { border-color: #444; transform: translateY(-2px); }
    .device-card:hover::before { transform: scaleX(1); }
    .device-card.offline { opacity: 0.45; }
    .device-card.offline::before { background: var(--danger); }

    .device-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.4rem;
    }
    .device-os {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .device-stats {
      display: flex;
      gap: 1rem;
    }
    .stat { flex: 1; }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: 0.2rem;
    }
    .device-status {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    .device-status.offline { background: var(--danger); animation: none; }
    .device-status.online { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(71,255,138,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(71,255,138,0); }
    }

    /* ── PROCESS VIEW ── */
    #page-processes { display: none; padding: 1.5rem 2.5rem; }
    #page-processes.active { display: block; }

    .proc-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .btn-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    .btn-back:hover { border-color: var(--fg); color: var(--fg); }

    .proc-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .proc-title span { color: var(--accent); }

    .proc-toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.6rem 1rem 0.6rem 2.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .proc-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── TABLE ── */
    .proc-table-wrap {
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .proc-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
    }
    .proc-table thead th {
      background: #111;
      color: var(--muted);
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .proc-table thead th:hover { color: var(--fg); }
    .proc-table thead th.sorted { color: var(--accent); }
    .proc-table tbody tr {
      border-bottom: 1px solid #181818;
      transition: background 0.1s;
    }
    .proc-table tbody tr:hover { background: #161616; }
    .proc-table tbody td {
      padding: 0.55rem 1rem;
      color: var(--fg);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .proc-table td.pid { color: var(--muted); font-size: 0.72rem; }
    .proc-table td.cpu { color: var(--accent); }
    .proc-table td.cpu.high { color: var(--danger); }
    .proc-table td.mem { color: #7eb8ff; }
    .kill-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--muted);
      padding: 0.25rem 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .kill-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,71,71,0.05); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      transform: translateY(10px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--danger);
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }
    .modal p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .modal p strong { color: var(--fg); }
    .modal-btns { display: flex; gap: 0.75rem; }
    .btn-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--fg); color: var(--fg); }
    .btn-kill {
      flex: 1;
      background: var(--danger);
      border: none;
      color: #fff;
      padding: 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.2s;
    }
    .btn-kill:hover { background: #e03333; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.8rem 1.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      z-index: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--danger); }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      .dash-header, #page-devices, #page-processes { padding: 1rem 1.2rem; }
      .proc-table td.user, .proc-table th:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV (hidden on login) -->
<nav id="main-nav" style="display:none">
  <a href="/" class="nav-logo">MK.DEV</a>
  <div class="nav-right">
    <span id="nav-user"></span>
    <button id="btn-logout">LOGOUT</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="page-login" class="page active">
  <div class="login-box">
    <h1>// CONTROL</h1>
    <p>myleskerschner.com/control</p>
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username" placeholder="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••"/>
    </div>
    <button class="btn-primary" id="btn-login">ENTER</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DEVICE LIST -->
<div id="page-devices" class="page">
  <div class="dash-header">
    <div>
      <h2>// <span>DEVICES</span></h2>
      <div class="dash-subtitle" id="devices-subtitle">SELECT A DEVICE TO VIEW PROCESSES</div>
    </div>
  </div>
  <div style="padding: 1.5rem 2.5rem">
    <div class="section-label">CONNECTED DEVICES</div>
    <div class="device-grid" id="device-grid">
      <div class="empty-state"><span class="spinner"></span>Loading devices...</div>
    </div>
  </div>
</div>

<!-- PROCESS LIST -->
<div id="page-processes" class="page">
  <div class="proc-header">
    <button class="btn-back" id="btn-back">← DEVICES</button>
    <div class="proc-title">// <span id="proc-device-name">DEVICE</span></div>
  </div>
  <div class="proc-toolbar">
    <div class="search-wrap">
      <input type="text" id="proc-search" placeholder="Search processes..."/>
    </div>
    <span class="proc-count" id="proc-count"></span>
    <button class="refresh-btn" id="btn-refresh">↻ REFRESH</button>
  </div>
  <div class="proc-table-wrap">
    <table class="proc-table">
      <thead>
        <tr>
          <th data-col="name">PROCESS</th>
          <th data-col="pid">PID</th>
          <th data-col="cpu">CPU %</th>
          <th data-col="mem">MEM MB</th>
          <th data-col="user">USER</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody id="proc-tbody"></tbody>
    </table>
  </div>
</div>

<!-- KILL MODAL -->
<div class="modal-overlay" id="kill-modal">
  <div class="modal">
    <h3>⚠ END TASK</h3>
    <p>Kill <strong id="modal-proc-name"></strong> (PID <strong id="modal-proc-pid"></strong>) on <strong id="modal-device-name"></strong>?<br><br>Unsaved work in that process will be lost.</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">CANCEL</button>
      <button class="btn-kill" id="modal-confirm">END TASK</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  // Change this to your Pi's tunnel URL
  const API = 'https://api.myleskerschner.com';
  // ────────────────────────────────────────────────────────────

  let authToken = sessionStorage.getItem('ctrl_token') || null;
  let currentDevice = null;
  let allProcesses = [];
  let sortCol = 'cpu';
  let sortAsc = false;
  let pollTimer = null;

  // ── UTILS ────────────────────────────────────────────────────
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('main-nav').style.display = id === 'page-login' ? 'none' : 'flex';
  }

  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function api(path, opts = {}) {
    const res = await fetch(API + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + authToken,
        ...(opts.headers || {})
      }
    });
    if (res.status === 401) { doLogout(); return null; }
    return res;
  }

  // ── AUTH ─────────────────────────────────────────────────────
  async function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('login-error');
    if (!user || !pass) { err.textContent = 'Enter username and password.'; return; }

    btn.disabled = true;
    btn.textContent = 'AUTHENTICATING...';
    err.textContent = '';

    try {
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        authToken = data.token;
        sessionStorage.setItem('ctrl_token', authToken);
        document.getElementById('nav-user').textContent = user.toUpperCase();
        showPage('page-devices');
        loadDevices();
      } else {
        err.textContent = data.error || 'Invalid credentials.';
      }
    } catch (e) {
      err.textContent = 'Cannot reach server. Is the Pi online?';
    }

    btn.disabled = false;
    btn.textContent = 'ENTER';
  }

  function doLogout() {
    authToken = null;
    sessionStorage.removeItem('ctrl_token');
    clearInterval(pollTimer);
    showPage('page-login');
    document.getElementById('login-pass').value = '';
  }

  // ── DEVICES ──────────────────────────────────────────────────
  async function loadDevices() {
    const grid = document.getElementById('device-grid');
    try {
      const res = await api('/devices');
      if (!res) return;
      const devices = await res.json();

      if (!devices.length) {
        grid.innerHTML = '<div class="empty-state">No devices reporting in yet.</div>';
        return;
      }

      grid.innerHTML = devices.map(d => `
        <div class="device-card ${d.online ? '' : 'offline'}" data-id="${d.id}">
          <div class="device-status ${d.online ? 'online' : 'offline'}"></div>
          <div class="device-name">${d.name}</div>
          <div class="device-os">${d.os} · ${d.online ? 'ONLINE' : 'LAST SEEN ' + d.last_seen}</div>
          <div class="device-stats">
            <div class="stat">
              <div class="stat-label">CPU</div>
              <div class="stat-value">${d.cpu_total ?? '—'}%</div>
            </div>
            <div class="stat">
              <div class="stat-label">MEM</div>
              <div class="stat-value">${d.mem_used_gb ?? '—'} GB</div>
            </div>
            <div class="stat">
              <div class="stat-label">PROCS</div>
              <div class="stat-value">${d.process_count ?? '—'}</div>
            </div>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.device-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          const dev = devices.find(d => d.id === id);
          if (dev) openDevice(dev);
        });
      });

      document.getElementById('devices-subtitle').textContent =
        devices.filter(d => d.online).length + ' OF ' + devices.length + ' ONLINE';

    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Failed to load devices.</div>';
    }
  }

  // ── PROCESSES ────────────────────────────────────────────────
  function openDevice(dev) {
    currentDevice = dev;
    document.getElementById('proc-device-name').textContent = dev.name.toUpperCase();
    showPage('page-processes');
    loadProcesses();
    clearInterval(pollTimer);
    pollTimer = setInterval(loadProcesses, 5000);
  }

  async function loadProcesses() {
    if (!currentDevice) return;
    try {
      const res = await api('/devices/' + currentDevice.id + '/processes');
      if (!res) return;
      allProcesses = await res.json();
      renderProcesses();
    } catch (e) {
      toast('Failed to fetch processes', true);
    }
  }

  function renderProcesses() {
    const query = document.getElementById('proc-search').value.toLowerCase();
    let procs = allProcesses.filter(p =>
      p.name.toLowerCase().includes(query) ||
      String(p.pid).includes(query) ||
      (p.user || '').toLowerCase().includes(query)
    );

    procs.sort((a, b) => {
      let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });

    document.getElementById('proc-count').textContent =
      procs.length + ' / ' + allProcesses.length + ' PROCESSES';

    const tbody = document.getElementById('proc-tbody');
    if (!procs.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--muted);font-family:Space Mono,monospace;font-size:0.8rem;">No matching processes.</td></tr>';
      return;
    }

    tbody.innerHTML = procs.map(p => `
      <tr>
        <td title="${p.name}">${p.name}</td>
        <td class="pid">${p.pid}</td>
        <td class="cpu ${p.cpu > 20 ? 'high' : ''}">${p.cpu.toFixed(1)}%</td>
        <td class="mem">${(p.mem_mb).toFixed(0)}</td>
        <td class="user">${p.user || '—'}</td>
        <td><button class="kill-btn" data-pid="${p.pid}" data-name="${p.name}">END</button></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.kill-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showKillModal(btn.dataset.pid, btn.dataset.name);
      });
    });

    // Update sort headers
    document.querySelectorAll('.proc-table thead th[data-col]').forEach(th => {
      th.classList.toggle('sorted', th.dataset.col === sortCol);
    });
  }

  // ── KILL MODAL ───────────────────────────────────────────────
  let pendingKill = null;

  function showKillModal(pid, name) {
    pendingKill = { pid, name };
    document.getElementById('modal-proc-name').textContent = name;
    document.getElementById('modal-proc-pid').textContent = pid;
    document.getElementById('modal-device-name').textContent = currentDevice.name;
    document.getElementById('kill-modal').classList.add('open');
  }

  async function confirmKill() {
    if (!pendingKill) return;
    document.getElementById('kill-modal').classList.remove('open');
    try {
      const res = await api('/devices/' + currentDevice.id + '/kill', {
        method: 'POST',
        body: JSON.stringify({ pid: parseInt(pendingKill.pid) })
      });
      if (res && res.ok) {
        toast('Killed ' + pendingKill.name);
        setTimeout(loadProcesses, 800);
      } else {
        toast('Failed to kill process', true);
      }
    } catch (e) {
      toast('Error sending kill command', true);
    }
    pendingKill = null;
  }

  // ── EVENT LISTENERS ──────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('btn-back').addEventListener('click', () => {
    clearInterval(pollTimer);
    showPage('page-devices');
    loadDevices();
  });
  document.getElementById('btn-refresh').addEventListener('click', loadProcesses);
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });
  document.getElementById('proc-search').addEventListener('input', renderProcesses);
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('kill-modal').classList.remove('open');
    pendingKill = null;
  });
  document.getElementById('modal-confirm').addEventListener('click', confirmKill);

  document.querySelectorAll('.proc-table thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = th.dataset.col;
        sortAsc = false;
      }
      renderProcesses();
    });
  });

  // ── INIT ─────────────────────────────────────────────────────
  if (authToken) {
    showPage('page-devices');
    loadDevices();
  }
</script>
</body>
</html>
