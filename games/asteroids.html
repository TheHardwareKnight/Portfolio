<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asteroids</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
C.width = Math.min(window.innerWidth, 700);
C.height = Math.min(window.innerHeight - 40, 600);
const W = C.width, H = C.height;

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup',  e => { keys[e.key] = false; });

let ship, bullets, asteroids, particles, score, lives, level, gameState, hi = 0;

function initGame() {
  ship = { x:W/2, y:H/2, vx:0, vy:0, angle:0, inv:180, dead:false };
  bullets = []; asteroids = []; particles = [];
  score = 0; lives = 3; level = 1; gameState = 'play';
  spawnAsteroids(4);
}

function spawnAsteroids(n, x, y, size) {
  for (let i=0;i<n;i++) {
    let ax = x ?? (Math.random()<0.5 ? Math.random()*W*0.3 : W-Math.random()*W*0.3);
    let ay = y ?? (Math.random()<0.5 ? Math.random()*H*0.3 : H-Math.random()*H*0.3);
    let s = size ?? 40+Math.random()*20;
    let angle = Math.random()*Math.PI*2;
    let spd = (1+level*0.3) * (0.5+Math.random());
    asteroids.push({ x:ax, y:ay, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, size:s,
      points: Array.from({length:10},(_,j)=>{ let a=j/10*Math.PI*2, r=s*(0.8+Math.random()*0.4); return {x:Math.cos(a)*r,y:Math.sin(a)*r}; }) });
  }
}

function spawnParticles(x, y, n, col) {
  for (let i=0;i<n;i++) {
    let a = Math.random()*Math.PI*2, spd = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:40+Math.random()*20, col});
  }
}

function update() {
  if (gameState !== 'play') return;
  // ship
  if (!ship.dead) {
    if (keys['ArrowLeft']||keys['a'])  ship.angle -= 0.05;
    if (keys['ArrowRight']||keys['d']) ship.angle += 0.05;
    if (keys['ArrowUp']||keys['w']) {
      ship.vx += Math.sin(ship.angle)*0.15;
      ship.vy -= Math.cos(ship.angle)*0.15;
    }
    ship.vx *= 0.98; ship.vy *= 0.98;
    ship.x = (ship.x+ship.vx+W)%W; ship.y = (ship.y+ship.vy+H)%H;
    if (ship.inv > 0) ship.inv--;
  }

  // bullets
  bullets.forEach(b=>{ b.x=(b.x+b.vx+W)%W; b.y=(b.y+b.vy+H)%H; b.life--; });
  bullets = bullets.filter(b=>b.life>0);

  // asteroids
  asteroids.forEach(a=>{ a.x=(a.x+a.vx+W)%W; a.y=(a.y+a.vy+H)%H; });

  // particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95; p.life--; });
  particles = particles.filter(p=>p.life>0);

  // bullet-asteroid collision
  bullets.forEach(b=>{
    asteroids.forEach(a=>{
      const dx=b.x-a.x, dy=b.y-a.y;
      if (Math.hypot(dx,dy)<a.size) {
        b.life=0; spawnParticles(a.x,a.y,8,'#e8ff47');
        let pts = a.size>25?50:a.size>15?100:200;
        score += pts;
        if (score>hi) hi=score;
        if (a.size>20) { spawnAsteroids(2, a.x, a.y, a.size*0.5); }
        a.size=0;
      }
    });
  });
  asteroids = asteroids.filter(a=>a.size>0);
  bullets = bullets.filter(b=>b.life>0);

  // ship-asteroid collision
  if (!ship.dead && ship.inv<=0) {
    asteroids.forEach(a=>{
      if (Math.hypot(ship.x-a.x,ship.y-a.y)<a.size+10) {
        spawnParticles(ship.x,ship.y,20,'#ffffff');
        lives--; ship.inv=180;
        if (lives<=0) { ship.dead=true; setTimeout(()=>gameState='over',1500); }
      }
    });
  }

  // next level
  if (!asteroids.length) { level++; spawnAsteroids(3+level); }
}

function drawShip() {
  if (ship.dead) return;
  if (ship.inv>0 && Math.floor(ship.inv/6)%2===0) return;
  ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle);
  ctx.strokeStyle='#e8ff47'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(9,10); ctx.lineTo(0,6); ctx.lineTo(-9,10); ctx.closePath(); ctx.stroke();
  if (keys['ArrowUp']||keys['w']) {
    ctx.strokeStyle='#ff7722'; ctx.beginPath(); ctx.moveTo(-4,8); ctx.lineTo(0,14+Math.random()*6); ctx.lineTo(4,8); ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/60;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // asteroids
  ctx.strokeStyle='#f0ede6'; ctx.lineWidth=1;
  asteroids.forEach(a=>{
    ctx.save(); ctx.translate(a.x,a.y);
    ctx.beginPath(); a.points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.closePath(); ctx.stroke(); ctx.restore();
  });

  // bullets
  ctx.fillStyle='#e8ff47';
  bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,2,0,Math.PI*2); ctx.fill(); });

  drawShip();

  // HUD
  ctx.fillStyle='#e8ff47'; ctx.font='bold 1.2rem Syne, sans-serif'; ctx.textAlign='left';
  ctx.fillText(score, 16, 30);
  ctx.fillStyle='#555'; ctx.font='0.65rem Space Mono, monospace';
  ctx.fillText('HI: '+hi, 16, 48);
  ctx.fillText('LVL '+level, 16, 64);
  // lives
  for (let i=0;i<lives;i++) {
    ctx.save(); ctx.translate(W-20-i*22, 20); ctx.strokeStyle='#e8ff47'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(5,6); ctx.lineTo(0,3); ctx.lineTo(-5,6); ctx.closePath(); ctx.stroke();
    ctx.restore();
  }

  if (gameState==='over') {
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2rem Syne, sans-serif'; ctx.textAlign='center';
    ctx.fillText('GAME OVER', W/2, H/2-20);
    ctx.fillStyle='#555'; ctx.font='0.75rem Space Mono, monospace';
    ctx.fillText('SCORE: '+score+'  •  PRESS SPACE', W/2, H/2+16);
  }

  if (gameState==='start') {
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2.5rem Syne, sans-serif'; ctx.textAlign='center';
    ctx.fillText('ASTEROIDS', W/2, H/2-30);
    ctx.fillStyle='#555'; ctx.font='0.75rem Space Mono, monospace';
    ctx.fillText('ARROWS/WASD + SPACE — PRESS SPACE TO START', W/2, H/2+20);
  }
}

let shooting = false;
document.addEventListener('keydown', e=>{
  if ((e.key===' '||e.key==='Escape') && gameState!=='play') { initGame(); }
  if (e.key===' ' && gameState==='play' && !ship.dead && !shooting) {
    shooting=true;
    bullets.push({x:ship.x+Math.sin(ship.angle)*14, y:ship.y-Math.cos(ship.angle)*14,
      vx:Math.sin(ship.angle)*8+ship.vx, vy:-Math.cos(ship.angle)*8+ship.vy, life:60});
    setTimeout(()=>shooting=false,200);
  }
});

gameState='start';
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
