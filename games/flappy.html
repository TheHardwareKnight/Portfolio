<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0a0a0a; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
  canvas { display:block; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c'), ctx = C.getContext('2d');
C.width = 400; C.height = 600;
const W=C.width, H=C.height;

const GAP=140, PIPE_W=50, GRAVITY=0.45, FLAP=-8, SPEED=2.5;
let bird, pipes, score, hi=0, state='start', frame=0;

function reset() {
  bird={x:80,y:H/2,v:0,angle:0};
  pipes=[{x:W+100,top:80+Math.random()*(H-GAP-160)}];
  score=0; frame=0;
}

function tap() {
  if(state==='start'||state==='over'){state='play';reset();}
  else if(state==='play'){bird.v=FLAP;}
}

C.addEventListener('click',tap);
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();tap();}});
document.addEventListener('touchstart',e=>{e.preventDefault();tap();});

function update(){
  if(state!=='play')return;
  frame++;
  bird.v+=GRAVITY; bird.y+=bird.v;
  bird.angle=Math.min(Math.PI/2,Math.max(-0.5,bird.v*0.06));

  if(frame%90===0&&pipes.length<5)
    pipes.push({x:W+50,top:80+Math.random()*(H-GAP-160)});

  pipes.forEach(p=>p.x-=SPEED);
  pipes=pipes.filter(p=>p.x>-PIPE_W);

  // score
  pipes.forEach(p=>{
    if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;if(score>hi)hi=score;}
  });

  // collision
  const bx=bird.x-10,by=bird.y-10,bw=20,bh=20;
  if(bird.y-10<0||bird.y+10>H){die();return;}
  pipes.forEach(p=>{
    if(bx<p.x+PIPE_W&&bx+bw>p.x){
      if(by<p.top||by+bh>p.top+GAP)die();
    }
  });
}

function die(){state='over';}

function draw(){
  // sky
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a14'); grad.addColorStop(1,'#0a0a0a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // stars
  if(state!=='play'||frame<5){
    ctx.fillStyle='#222';
    for(let i=0;i<40;i++){
      ctx.fillRect(((i*137)%W),(((i*97)+31)%H),1,1);
    }
  }

  // pipes
  pipes.forEach(p=>{
    ctx.fillStyle='#141414'; ctx.strokeStyle='#e8ff47'; ctx.lineWidth=2;
    // top
    ctx.fillRect(p.x,0,PIPE_W,p.top);
    ctx.strokeRect(p.x,0,PIPE_W,p.top);
    // cap
    ctx.fillRect(p.x-4,p.top-16,PIPE_W+8,16);
    ctx.strokeRect(p.x-4,p.top-16,PIPE_W+8,16);
    // bottom
    ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP);
    ctx.strokeRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP);
    ctx.fillRect(p.x-4,p.top+GAP,PIPE_W+8,16);
    ctx.strokeRect(p.x-4,p.top+GAP,PIPE_W+8,16);
  });

  // bird
  ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(bird.angle);
  ctx.fillStyle='#e8ff47'; ctx.beginPath();
  ctx.ellipse(0,0,14,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0a0a'; ctx.beginPath(); ctx.arc(5,-2,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(6,-3,1.5,0,Math.PI*2); ctx.fill();
  // wing
  ctx.fillStyle='#c8cc30';
  ctx.beginPath(); ctx.ellipse(-3,4,7,4,bird.v*0.05,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // HUD
  ctx.fillStyle='#e8ff47'; ctx.font='bold 2rem Syne, sans-serif'; ctx.textAlign='center';
  if(state==='play') ctx.fillText(score,W/2,50);
  ctx.fillStyle='#333'; ctx.font='0.65rem Space Mono, monospace';
  ctx.fillText('BEST: '+hi,W/2,72);

  if(state==='start'){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2.5rem Syne, sans-serif';
    ctx.fillText('FLAPPY', W/2, H/2-40);
    ctx.fillStyle='#555'; ctx.font='0.75rem Space Mono, monospace';
    ctx.fillText('TAP / SPACE / CLICK TO START', W/2, H/2+10);
  }

  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2rem Syne, sans-serif';
    ctx.fillText('GAME OVER', W/2, H/2-30);
    ctx.fillStyle='#f0ede6'; ctx.font='1.2rem Syne, sans-serif';
    ctx.fillText('SCORE: '+score, W/2, H/2+10);
    ctx.fillStyle='#555'; ctx.font='0.75rem Space Mono, monospace';
    ctx.fillText('TAP / SPACE TO RETRY', W/2, H/2+46);
  }
}

reset();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
