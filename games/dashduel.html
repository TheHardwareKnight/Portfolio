<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dash Duel</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0a0a0a; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
C.width=Math.min(window.innerWidth,680);
C.height=Math.min(window.innerHeight,500);
const W=C.width,H=C.height;

const GRAVITY=0.45,ARENA_TOP=60,ARENA_BOTTOM=H-50;
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

let p1,p2,orbs,score1,score2,state,particles,frame;

function makePlayer(x,side,color,controls){
  return {
    x,y:H/2,vx:0,vy:0,w:28,h:36,color,side,
    hp:3,dashCD:0,dashTimer:0,blocking:false,stunned:0,
    onGround:false,controls,face:side===1?1:-1,
    dashVx:0,dashVy:0,trail:[]
  };
}

function initRound(){
  p1=makePlayer(W*0.2, 1,'#e8ff47',{up:'w',down:'s',dash:'d',block:'a'});
  p2=makePlayer(W*0.8,-1,'#ff4747',{up:'ArrowUp',down:'ArrowDown',dash:'ArrowLeft',block:'ArrowRight'});
  orbs=[]; particles=[]; frame=0; state='play';
}

function initGame(){ score1=0; score2=0; initRound(); }

function addParticles(x,y,col,n,spd=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=spd*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:25+Math.random()*20,col,r:2+Math.random()*3});
  }
}

function spawnOrb(x,y){
  orbs.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*3-2,life:200,r:6,glow:0});
}

function updatePlayer(p,other){
  if(p.stunned>0){p.stunned--;p.vx*=0.9;p.vy+=GRAVITY;p.x+=p.vx;p.y+=p.vy;}
  else{
    // movement
    if(keys[p.controls.up]&&p.onGround) p.vy=-12;
    if(keys[p.controls.down]&&!p.onGround) p.vy+=1.5;
    p.blocking=keys[p.controls.block];
    // dash
    if(keys[p.controls.dash]&&p.dashCD===0){
      p.dashVx=p.face*14; p.dashVy=p.vy*0.3;
      p.dashTimer=12; p.dashCD=35;
      addParticles(p.x,p.y-p.h/2,p.color,5,5);
    }
    if(p.dashTimer>0){
      p.vx=p.dashVx; p.vy=p.dashVy;
      p.dashTimer--;
    } else {
      p.vx+=(p.face===1?0.2:-0.2); // drift toward center
      p.vx*=0.88;
    }
    p.vy+=GRAVITY;
    if(p.dashCD>0)p.dashCD--;
  }

  // trail
  p.trail.push({x:p.x,y:p.y-p.h/2,a:p.dashTimer>0?0.4:0.1});
  if(p.trail.length>8) p.trail.shift();

  p.x+=p.vx; p.y+=p.vy;

  // arena bounds
  if(p.x<p.w/2){p.x=p.w/2;p.vx=Math.abs(p.vx)*0.5;}
  if(p.x>W-p.w/2){p.x=W-p.w/2;p.vx=-Math.abs(p.vx)*0.5;}
  if(p.y<ARENA_TOP+p.h){p.y=ARENA_TOP+p.h;p.vy=Math.abs(p.vy)*0.3;}
  p.onGround=false;
  if(p.y>ARENA_BOTTOM){p.y=ARENA_BOTTOM;p.vy=0;p.onGround=true;}

  // face opponent
  p.face=other.x>p.x?1:-1;

  // dash collision
  if(p.dashTimer>0&&p.stunned===0){
    const dx=p.x-other.x, dy=(p.y-p.h/2)-(other.y-other.h/2);
    if(Math.abs(dx)<30&&Math.abs(dy)<36){
      if(other.blocking){
        // deflect
        p.vx*=-1.2; p.vy-=5; p.dashTimer=0;
        addParticles(other.x,other.y-other.h/2,'#ffffff',10,6);
      } else {
        other.vx+=p.dashVx*0.8; other.vy-=8;
        other.stunned=30; other.hp--;
        addParticles(other.x,other.y-other.h/2,other.color,12,5);
        p.dashTimer=0;
        if(other.hp<=0){ other.hp=0; state='roundover'; setTimeout(()=>{ if(p===p1)score1++;else score2++; initRound(); },2200); }
      }
    }
  }
}

function update(){
  if(state!=='play')return;
  frame++;
  updatePlayer(p1,p2); updatePlayer(p2,p1);

  // orbs
  if(frame%120===0) spawnOrb(W/2+(Math.random()-0.5)*W*0.4, ARENA_TOP+50+Math.random()*(ARENA_BOTTOM-ARENA_TOP-100));
  orbs.forEach(o=>{o.x+=o.vx;o.y+=o.vy;o.vy+=0.08;o.life--;o.glow=(o.glow+0.1)%Math.PI;
    if(o.y>ARENA_BOTTOM-o.r){o.y=ARENA_BOTTOM-o.r;o.vy*=-0.7;}
    if(o.x<o.r||o.x>W-o.r)o.vx*=-1;
    // pickup
    [p1,p2].forEach(p=>{
      if(Math.hypot(p.x-o.x,p.y-o.h/2-o.y)<20){
        o.life=0; p.dashCD=0;
        addParticles(o.x,o.y,'#ffffff',8,4);
      }
    });
  });
  orbs=orbs.filter(o=>o.life>0);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;p.r*=0.97;});
  particles=particles.filter(p=>p.life>0);
}

function drawHP(x,y,hp,col){
  for(let i=0;i<3;i++){
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.strokeRect(x+i*18,y,14,14);
    if(i<hp){ctx.fillStyle=col;ctx.fillRect(x+i*18+2,y+2,10,10);}
  }
}

function drawPlayer(p){
  // trail
  p.trail.forEach((t,i)=>{
    ctx.globalAlpha=t.a*(i/p.trail.length);
    ctx.fillStyle=p.color;
    ctx.fillRect(t.x-p.w/2,t.y-4,p.w,8);
  });
  ctx.globalAlpha=1;

  ctx.save(); ctx.translate(p.x,p.y);
  // block shield
  if(p.blocking){
    ctx.strokeStyle='rgba(100,200,255,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(p.face*16,-p.h/2,22,0,Math.PI*2); ctx.stroke();
  }
  // body
  ctx.fillStyle=p.stunned>0?'#888':p.color;
  ctx.fillRect(-p.w/2,-p.h,p.w,p.h);
  // head
  ctx.beginPath(); ctx.arc(0,-p.h-10,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0a0a'; ctx.beginPath(); ctx.arc(p.face*5,-p.h-10,3.5,0,Math.PI*2); ctx.fill();
  // dash indicator
  if(p.dashCD===0){
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,-p.h-24,5,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);

  // arena
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1;
  ctx.strokeRect(1,ARENA_TOP,W-2,ARENA_BOTTOM-ARENA_TOP);
  // floor
  ctx.fillStyle='#141414'; ctx.fillRect(0,ARENA_BOTTOM,W,H-ARENA_BOTTOM);
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,ARENA_BOTTOM); ctx.lineTo(W,ARENA_BOTTOM); ctx.stroke();

  // center line
  ctx.setLineDash([4,8]); ctx.strokeStyle='#1a1a1a';
  ctx.beginPath(); ctx.moveTo(W/2,ARENA_TOP); ctx.lineTo(W/2,ARENA_BOTTOM); ctx.stroke();
  ctx.setLineDash([]);

  // orbs
  orbs.forEach(o=>{
    const g=Math.sin(o.glow);
    ctx.globalAlpha=0.3+g*0.2;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r+3+g*3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
  });

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/45;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  drawPlayer(p1); drawPlayer(p2);

  // HUD
  ctx.textAlign='left';
  ctx.fillStyle='#e8ff47'; ctx.font='bold 1.5rem Syne,sans-serif'; ctx.fillText(score1,16,36);
  drawHP(16,46,p1.hp,'#e8ff47');
  ctx.textAlign='right';
  ctx.fillStyle='#ff4747'; ctx.font='bold 1.5rem Syne,sans-serif'; ctx.fillText(score2,W-16,36);
  drawHP(W-16-3*18,46,p2.hp,'#ff4747');
  ctx.textAlign='center';
  ctx.fillStyle='#333'; ctx.font='0.6rem Space Mono,monospace';
  ctx.fillText('P1: W/S A(block) D(dash)  •  P2: ↑↓ →(block) ←(dash)',W/2,H-14);
  ctx.fillStyle='#555'; ctx.font='0.6rem Space Mono,monospace';
  ctx.fillText('⚪ = DASH RECHARGE',W/2,H-30);

  if(state==='start'){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2.2rem Syne,sans-serif';
    ctx.fillText('DASH DUEL',W/2,H/2-50);
    ctx.fillStyle='#f0ede6'; ctx.font='0.8rem Space Mono,monospace';
    ctx.fillText('DASH into your opponent to deal damage',W/2,H/2-10);
    ctx.fillText('BLOCK to deflect their dash back at them',W/2,H/2+12);
    ctx.fillText('Grab ⚪ orbs to reset your dash cooldown',W/2,H/2+34);
    ctx.fillStyle='#e8ff47'; ctx.font='0.7rem Space Mono,monospace';
    ctx.fillText('PRESS ANY KEY TO START',W/2,H/2+70);
  }

  if(state==='roundover'){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    const winner=p1.hp<=0?'P2':'P1';
    const col=p1.hp<=0?'#ff4747':'#e8ff47';
    ctx.fillStyle=col; ctx.font='bold 2rem Syne,sans-serif';
    ctx.fillText(winner+' WINS ROUND!',W/2,H/2);
  }
}

state='start';
document.addEventListener('keydown',e=>{ if(state==='start') initGame(); });

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
