<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rooftop Duel</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; font-family:'Space Mono',monospace; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
C.width=Math.min(window.innerWidth,700);
C.height=Math.min(window.innerHeight,480);
const W=C.width,H=C.height;

const GRAVITY=0.5,GROUND=H-80,PLATFORM_Y=GROUND-20;
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

let p1,p2,bullets,score1,score2,state,roundTimer,particles;

const PLATFORMS=[
  {x:W/2-120,y:PLATFORM_Y,w:240,h:20},
  {x:80,y:PLATFORM_Y-80,w:120,h:15},
  {x:W-200,y:PLATFORM_Y-80,w:120,h:15},
  {x:W/2-70,y:PLATFORM_Y-140,w:140,h:15},
];

function makePlayer(x,facing,color,controls){
  return {x,y:PLATFORM_Y-30,vx:0,vy:0,w:22,h:32,facing,color,onGround:false,inv:0,dead:false,controls,shootCD:0};
}

function initRound(){
  p1=makePlayer(W/2-80,1,'#e8ff47',{left:'a',right:'d',jump:'w',shoot:'q'});
  p2=makePlayer(W/2+80,-1,'#ff4747',{left:'ArrowLeft',right:'ArrowRight',jump:'ArrowUp',shoot:'ArrowDown'});
  bullets=[]; particles=[]; state='play'; roundTimer=0;
}

function initGame(){
  score1=0; score2=0; initRound();
}

function addParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,col});
  }
}

function collide(p){
  p.onGround=false;
  PLATFORMS.forEach(pl=>{
    if(p.x+p.w/2>pl.x&&p.x-p.w/2<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+p.vy+2&&p.vy>=0){
      p.y=pl.y-p.h; p.vy=0; p.onGround=true;
    }
  });
  if(p.x<p.w/2)p.x=p.w/2;
  if(p.x>W-p.w/2)p.x=W-p.w/2;
}

function updatePlayer(p){
  if(p.dead)return;
  if(keys[p.controls.left]){p.vx-=0.8;p.facing=-1;}
  if(keys[p.controls.right]){p.vx+=0.8;p.facing=1;}
  if(keys[p.controls.jump]&&p.onGround){p.vy=-13;}
  p.vx*=0.82; p.vy+=GRAVITY;
  p.x+=p.vx; p.y+=p.vy;
  collide(p);
  if(p.inv>0)p.inv--;
  if(p.shootCD>0)p.shootCD--;
  if(keys[p.controls.shoot]&&p.shootCD===0){
    bullets.push({x:p.x+p.facing*14,y:p.y-p.h/2,vx:p.facing*12,vy:-2,owner:p,life:60});
    p.vx-=p.facing*3; // recoil
    p.vy-=2;
    p.shootCD=18;
  }
  if(p.y>H+50)p.dead=true;
}

function update(){
  if(state!=='play')return;
  roundTimer++;
  updatePlayer(p1); updatePlayer(p2);

  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=0.15;b.life--;});
  bullets=bullets.filter(b=>b.life>0&&b.y<H+20);

  // bullet-player hit
  [p1,p2].forEach(p=>{
    bullets.forEach(b=>{
      if(b.owner===p)return;
      if(!p.dead&&p.inv===0&&Math.abs(b.x-p.x)<14&&Math.abs(b.y-(p.y-p.h/2))<18){
        b.life=0;
        addParticles(p.x,p.y-p.h/2,'#fff',6);
        p.vx+=b.vx*0.8; p.vy+=b.vy*0.8-4;
        p.inv=15;
      }
    });
  });
  bullets=bullets.filter(b=>b.life>0);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.vx*=0.95;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // round end
  if(p1.dead||p2.dead){
    if(p1.dead)score2++;
    if(p2.dead)score1++;
    state='roundover';
    setTimeout(()=>initRound(),2000);
  }
}

function drawPlayer(p){
  if(p.dead)return;
  if(p.inv>0&&Math.floor(p.inv/3)%2===0)return;
  ctx.save(); ctx.translate(p.x,p.y);
  // body
  ctx.fillStyle=p.color;
  ctx.fillRect(-p.w/2,-p.h,p.w,p.h);
  // head
  ctx.beginPath(); ctx.arc(0,-p.h-10,12,0,Math.PI*2); ctx.fill();
  // eye
  ctx.fillStyle='#0a0a0a';
  ctx.beginPath(); ctx.arc(p.facing*5,-p.h-10,4,0,Math.PI*2); ctx.fill();
  // gun
  ctx.fillStyle='#aaa';
  ctx.fillRect(p.facing>0?8:-20,-p.h-8,12,5);
  ctx.restore();
}

function draw(){
  // sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#050510'); grad.addColorStop(1,'#0a0a0a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // city skyline (decorative)
  ctx.fillStyle='#0d0d0d';
  [20,80,160,240,300,380,460,540,600].forEach((bx,i)=>{
    const bh=60+[40,80,50,90,60,70,55,85,45][i];
    ctx.fillRect(bx,GROUND-bh,55,bh);
  });

  // platforms
  PLATFORMS.forEach(pl=>{
    ctx.fillStyle='#141414'; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(pl.x,pl.y,pl.w,pl.h);
    // edge glow
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pl.x,pl.y); ctx.lineTo(pl.x+pl.w,pl.y); ctx.stroke();
  });

  // ground
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/50;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // bullets
  bullets.forEach(b=>{
    ctx.fillStyle='#e8ff47'; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(232,255,71,0.3)';
    ctx.beginPath(); ctx.arc(b.x,b.y,6,0,Math.PI*2); ctx.fill();
  });

  drawPlayer(p1); drawPlayer(p2);

  // HUD
  ctx.font='bold 1.5rem Syne,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#e8ff47'; ctx.fillText(score1,W/4,36);
  ctx.fillStyle='#ff4747'; ctx.fillText(score2,W*3/4,36);
  ctx.fillStyle='#333'; ctx.font='0.6rem Space Mono,monospace';
  ctx.fillText('P1: A/D/W/Q',W/4,54);
  ctx.fillText('P2: ARROWS',W*3/4,54);
  ctx.fillStyle='#555'; ctx.fillText('VS',W/2,36);

  if(state==='start'){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e8ff47'; ctx.font='bold 2.2rem Syne,sans-serif';
    ctx.fillText('ROOFTOP DUEL',W/2,H/2-30);
    ctx.fillStyle='#555'; ctx.font='0.72rem Space Mono,monospace';
    ctx.fillText('P1: A/D move  W jump  Q shoot',W/2,H/2+10);
    ctx.fillText('P2: ARROWS move  ↓ shoot',W/2,H/2+30);
    ctx.fillStyle='#e8ff47'; ctx.font='0.7rem Space Mono,monospace';
    ctx.fillText('PRESS ANY KEY TO START',W/2,H/2+65);
  }

  if(state==='roundover'){
    const winner=p1.dead&&!p2.dead?'P2 WINS!':!p1.dead&&p2.dead?'P1 WINS!':'DRAW!';
    const col=p1.dead&&!p2.dead?'#ff4747':'#e8ff47';
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=col; ctx.font='bold 2rem Syne,sans-serif';
    ctx.fillText(winner,W/2,H/2);
  }
}

state='start';
document.addEventListener('keydown',e=>{ if(state==='start') initGame(); });

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
